<!DOCTYPE html>
<html lang="pl">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wypłata</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    font-weight: bold;
    text-align: center;
}

.top {
    margin-top: 30px;
    font-size: 18px;
}

input, select {
    width: 90%;
    max-width: 400px;
    padding: 15px;
    margin: 10px auto;
    display: block;
    border: none;
    font-size: 16px;
}

button {
    width: 90%;
    max-width: 400px;
    padding: 20px;
    margin: 15px auto;
    display: block;
    background: white;
    color: black;
    border: none;
    font-size: 18px;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

.modal-box {
    background: black;
    border: 2px solid white;
    padding: 30px;
    width: 80%;
    max-width: 300px;
}
</style>
</head>

<body>

<h2>Wypłata</h2>

<div class="top">WYPŁATY SĄ DARMOWE</div>

<select>
    <option>PKO Bank Polski</option>
    <option>mBank</option>
    <option>ING Bank Śląski</option>
    <option>Santander Bank Polska</option>
    <option>Alior Bank</option>
    <option>BLIK</option>
    <option>UniCredit</option>
</select>

<input type="text" placeholder="Nazwa konta">
<input type="text" placeholder="Numer konta">
<input type="number" placeholder="Kwota">

<button onclick="show()">Wypłać</button>

<div class="modal" id="modal">
    <div class="modal-box">
        <p>AKTYWUJ SWOJE KONTO PRZED DOKONANIEM WYPŁATY</p>
        <button onclick="closeModal()">OK</button>
    </div>
</div>

<script>
function show(){
    document.getElementById("modal").style.display = "flex";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
